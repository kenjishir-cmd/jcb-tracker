<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0f14">
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JCB 登錄管家 v1.20</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2230;
    --border: #2a2f3d;
    --jcb-red: #e5001a;
    --jcb-green: #00c97a;
    --yellow: #f5c842;
    --blue: #4f8ef7;
    --blue-dim: rgba(79,142,247,0.13);
    --text: #e8eaf0;
    --text-muted: #6b7280;
    --text-dim: #9ca3af;
  }

  html, body { margin:0; padding:0; box-sizing:border-box; overscroll-behavior-y: contain; }
  body { background:var(--bg); color:var(--text); font-family:'Noto Sans TC',sans-serif; padding:20px 16px 60px; }

  .header { text-align:center; margin-bottom:18px; }
  .header h1 { font-size:22px; font-weight:700; margin:8px 0 4px; }
  .header-sub { font-size:12px; color:var(--text-muted); font-family:'DM Mono'; }

  /* 知識看板：精簡橫向 */
  .knowledge-card {
    background: var(--blue-dim); border: 1px solid var(--blue);
    border-radius: 12px; padding: 12px 16px; margin-bottom: 20px;
    display: block;
  }
  .k-title { font-size: 13px; font-weight: 700; color: var(--blue); margin-bottom: 4px; display: block; }
  .k-text { font-size: 11px; color: var(--text-dim); line-height: 1.5; display: block; }

  .period-bar { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px 20px; margin-bottom:24px; display:flex; align-items:center; gap:12px; }
  .period-dot { width:10px; height:10px; border-radius:50%; background: #333; }
  .period-dot.open { background:var(--jcb-green); box-shadow:0 0 8px var(--jcb-green); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .period-status { font-size:13px; font-weight:500; }

  /* 核心卡片：鎖定橫向拉長版面 */
  .cards-grid { display: block; }
  .card {
    background:var(--surface); border:1px solid var(--border); border-radius:14px;
    padding:16px 18px; margin-bottom:12px; position:relative; overflow:hidden;
    display: flex; align-items: center; justify-content: space-between; /* 資訊在左、按鈕在右 */
  }
  .card::before { content:''; position:absolute; top:0; left:0; width:3px; height:100%; background:var(--border); }
  .card.maxed::before { background:var(--jcb-red); }
  .card.open-window::before { background:var(--jcb-green); }

  .card-left { display: flex; align-items: center; gap: 12px; flex: 1; }
  .card-icon { width:36px; height:36px; border-radius:8px; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink: 0; }
  .card-name { font-size:14px; font-weight:500; display: block; }
  .card-bank { font-size:11px; color:var(--text-muted); display: block; }

  .card-center { margin: 0 15px; display: flex; gap: 4px; flex-shrink: 0; }
  .pip { width:20px; height:20px; border-radius:50%; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:10px; }
  .pip.used { background:var(--jcb-red); border-color:var(--jcb-red); color:#fff; }

  .btn-register {
    min-width: 90px; padding: 10px 12px; border-radius: 9px; border: none;
    font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; flex-shrink: 0;
  }
  .btn-register.can { background:var(--jcb-green); color:#0d0f14; }
  .btn-register.disabled { background:var(--surface2); color:var(--text-muted); cursor:not-allowed; }

  #toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--surface2); border:1px solid var(--border); padding:10px 20px; border-radius:30px; font-size:13px; z-index:999; transition:0.3s; opacity:0; }
  #toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
</style>
</head>
<body>

<div class="header">
  <h1>登錄管家</h1>
  <div class="header-sub" id="current-date"></div>
</div>

<div class="knowledge-card" id="knowledge-card">
  <span class="k-title" id="k-title">卡片小知識</span>
  <span class="k-text" id="k-text">載入中...</span>
</div>

<div class="period-bar">
  <div class="period-dot" id="period-dot"></div>
  <div class="period-status" id="period-status">偵測中...</div>
</div>

<div class="cards-grid" id="cards-grid"></div>
<div id="toast"></div>

<script>
const CARDS = [
  { id:'federal_breezy', bank:'聯邦銀行', name:'微風 JCB', icon:'🌿' },
  { id:'federal_crane',  bank:'聯邦銀行', name:'吉鶴 JCB', icon:'🦢' },
  { id:'ctbc_lala',      bank:'中國信託', name:'LALAPORT JCB', icon:'🛍️' },
  { id:'esun_kumamon',   bank:'玉山銀行', name:'熊本熊 JCB', icon:'🐻' },
  { id:'skb_easycard',   bank:'新光銀行', name:'新光悠遊 JCB', icon:'🚇' },
  { id:'fubon_jcb',      bank:'富邦銀行', name:'JU卡紅 JCB', icon:'💳' }
];

const KNOWLEDGE_BASE = [
  { title: "2026 JCB 新制", text: "悠遊卡自動加值 10% 回饋改為「每卡每年限登錄 3 次」。" },
  { title: "機場接送", text: "晶緻卡單筆滿 3 萬享免費接送，每月限量 1,000 趟。" },
  { title: "星巴克優惠", text: "每週一 10:30 開放領序號，現場買指定飲品享半價。" },
  { title: "日本店面回饋", text: "2026 JCB 日本實體消費滿額享回饋，記得官網登錄。" }
];

const KEY = 'jcb_v4';
let data = JSON.parse(localStorage.getItem(KEY)) || {};

function getWeekday(date) { return ["週日", "週一", "週二", "週三", "週四", "週五", "週六"][date.getDay()]; }

function render() {
  const t = new Date();
  document.getElementById('current-date').textContent = `${t.getFullYear()}/${t.getMonth()+1}/${t.getDate()} (${getWeekday(t)}) ${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;

  const day = t.getDate();
  const isOpen = (day >= 1 && day <= 5) || (day >= 11 && day <= 15) || (day >= 21 && day <= 25);
  
  document.getElementById('period-status').textContent = isOpen ? "✓ 目前為登錄時段" : "✕ 目前非登錄時段";
  document.getElementById('period-status').style.color = isOpen ? "var(--jcb-green)" : "var(--text-muted)";
  document.getElementById('period-dot').className = 'period-dot ' + (isOpen ? 'open' : '');

  document.getElementById('cards-grid').innerHTML = CARDS.map(c => {
    const list = data[c.id] || [];
    const isMaxed = list.length >= 3;
    let cls = isMaxed ? 'maxed' : (isOpen ? 'open-window' : '');
    
    return `
      <div class="card ${cls}">
        <div class="card-left">
          <div class="card-icon">${c.icon}</div>
          <div class="card-meta">
            <span class="card-name">${c.name}</span>
            <span class="card-bank">${c.bank}</span>
          </div>
        </div>
        <div class="card-center">
          <div class="pip ${list.length>=1?'used':''}"></div>
          <div class="pip ${list.length>=2?'used':''}"></div>
          <div class="pip ${list.length>=3?'used':''}"></div>
        </div>
        <button class="btn-register ${isOpen && !isMaxed ?'can':'disabled'}">
          ${isMaxed ? '已滿' : (isOpen ? '登錄' : '待機')}
        </button>
      </div>`;
  }).join('');
}

function showRandomKnowledge() {
  const item = KNOWLEDGE_BASE[Math.floor(Math.random() * KNOWLEDGE_BASE.length)];
  document.getElementById('k-title').textContent = item.title;
  document.getElementById('k-text').textContent = item.text;
}

render();
showRandomKnowledge();
setInterval(render, 60000);
</script>
</body>
</html>
