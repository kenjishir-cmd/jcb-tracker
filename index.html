<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JCB 登錄管家 v1.17</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Noto+Sans+TC', sans-serif;
            background-color: #f8fafc;
            touch-action: manipulation;
        }

        .card-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .status-badge {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 9999px;
            font-weight: 500;
        }

        .count-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background-color: #ef4444;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: bold;
            border: 2px solid white;
        }

        .tab-active {
            color: #2563eb;
            border-bottom: 2px solid #2563eb;
        }

        /* 專為 S23 Ultra 優化的動畫 */
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="pb-24">
    <header class="bg-blue-600 text-white p-4 sticky top-0 z-50 card-shadow">
        <div class="flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center">
                <i class="fas fa-credit-card mr-2"></i> JCB 登錄管家
            </h1>
            <div id="countdown" class="text-sm font-mono bg-blue-700 px-3 py-1 rounded">
                載入中...
            </div>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto">
        <div class="bg-white rounded-2xl p-6 mb-6 card-shadow fade-in">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-gray-500 font-medium">本月登錄進度</h2>
                <span class="text-blue-600 text-sm font-bold">全年上限: 30 次</span>
            </div>
            <div class="flex items-end space-x-2">
                <span id="monthlyCount" class="text-4xl font-bold text-gray-800">0</span>
                <span class="text-gray-400 mb-1">/ 10 次</span>
            </div>
            <div class="w-full bg-gray-100 rounded-full h-2.5 mt-4">
                <div id="progressBar" class="bg-blue-600 h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <div class="flex border-b mb-4">
            <button onclick="switchTab('cards')" id="tab-cards" class="flex-1 py-2 text-center font-medium tab-active">我的卡片</button>
            <button onclick="switchTab('history')" id="tab-history" class="flex-1 py-2 text-center font-medium text-gray-500">歷史紀錄</button>
        </div>

        <div id="cardsView" class="space-y-4">
            </div>

        <div id="historyView" class="hidden space-y-3">
            </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-around items-center card-shadow z-50">
        <button onclick="openAddCardModal()" class="flex flex-col items-center text-blue-600">
            <i class="fas fa-plus-circle text-2xl"></i>
            <span class="text-xs mt-1">新增卡片</span>
        </button>
        <button onclick="exportData()" class="flex flex-col items-center text-gray-500">
            <i class="fas fa-file-export text-2xl"></i>
            <span class="text-xs mt-1">備份</span>
        </button>
        <button onclick="showResetConfirmation()" class="flex flex-col items-center text-red-500">
            <i class="fas fa-trash-alt text-2xl"></i>
            <span class="text-xs mt-1">重置</span>
        </button>
    </nav>

    <div id="logModal" class="fixed inset-0 bg-black/50 hidden z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm">
            <h3 class="text-lg font-bold mb-4">確認登錄</h3>
            <p id="modalCardName" class="text-gray-600 mb-6 font-medium"></p>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="closeModal()" class="py-3 bg-gray-100 rounded-xl font-bold">取消</button>
                <button id="confirmBtn" class="py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg shadow-blue-200">完成登錄</button>
            </div>
        </div>
    </div>

    <script>
        // 預設卡片資料
        let cards = JSON.parse(localStorage.getItem('jcb_cards')) || [
            { id: 1, bank: '中國信託', name: '漢神百貨 JCB', type: '百貨', lastLog: null, logs: [] },
            { id: 2, bank: '富邦', name: 'JU卡紅 JCB', type: '一般', lastLog: null, logs: [] },
            { id: 3, bank: '新光', name: '悠遊 JCB', type: '交通', lastLog: null, logs: [] }
        ];

        // 初始化渲染
        function init() {
            renderCards();
            updateStats();
            startCountdown();
            saveData();
        }

        function renderCards() {
            const container = document.getElementById('cardsView');
            container.innerHTML = cards.map(card => `
                <div class="bg-white rounded-xl p-4 card-shadow relative overflow-hidden border-l-4 border-blue-500">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="status-badge bg-gray-100 text-gray-600 mb-1 inline-block">${card.bank}</span>
                            <h3 class="font-bold text-lg text-gray-800">${card.name}</h3>
                        </div>
                        <button onclick="triggerLog(${card.id})" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-lg font-bold active:scale-95 transition-transform">
                            登錄
                        </button>
                    </div>
                    <div class="mt-3 text-sm text-gray-400">
                        最後登錄: ${card.lastLog || '無紀錄'}
                    </div>
                    ${card.logs.filter(l => isThisMonth(l)).length > 0 ? `<div class="count-badge">${card.logs.filter(l => isThisMonth(l)).length}</div>` : ''}
                </div>
            `).join('');
        }

        function triggerLog(id) {
            const card = cards.find(c => c.id === id);
            document.getElementById('modalCardName').textContent = `${card.bank} - ${card.name}`;
            document.getElementById('logModal').classList.remove('hidden');
            document.getElementById('confirmBtn').onclick = () => processLog(id);
        }

        function processLog(id) {
            const now = new Date();
            const dateStr = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`;
            
            cards = cards.map(card => {
                if(card.id === id) {
                    return {
                        ...card,
                        lastLog: dateStr,
                        logs: [...card.logs, now.toISOString()]
                    }
                }
                return card;
            });
            
            closeModal();
            init();
            showToast('登錄成功！');
        }

        // 輔助功能
        function isThisMonth(dateStr) {
            const d = new Date(dateStr);
            const now = new Date();
            return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
        }

        function updateStats() {
            let totalThisMonth = 0;
            cards.forEach(card => {
                totalThisMonth += card.logs.filter(l => isThisMonth(l)).length;
            });
            
            document.getElementById('monthlyCount').textContent = totalThisMonth;
            const progress = Math.min((totalThisMonth / 10) * 100, 100);
            document.getElementById('progressBar').style.width = `${progress}%`;
        }

        function startCountdown() {
            setInterval(() => {
                const now = new Date();
                const target = new Date();
                target.setHours(9, 0, 0, 0); // JCB 登錄通常是早上 9 點
                
                if (now > target) target.setDate(target.getDate() + 1);
                
                const diff = target - now;
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                
                document.getElementById('countdown').textContent = `下次登錄: ${h}h ${m}m ${s}s`;
            }, 1000);
        }

        function switchTab(tab) {
            if(tab === 'cards') {
                document.getElementById('cardsView').classList.remove('hidden');
                document.getElementById('historyView').classList.add('hidden');
                document.getElementById('tab-cards').classList.add('tab-active');
                document.getElementById('tab-history').classList.remove('tab-active');
            } else {
                document.getElementById('cardsView').classList.add('hidden');
                document.getElementById('historyView').classList.remove('hidden');
                document.getElementById('tab-cards').classList.remove('tab-active');
                document.getElementById('tab-history').classList.add('tab-active');
                renderHistory();
            }
        }

        function renderHistory() {
            const history = [];
            cards.forEach(c => {
                c.logs.forEach(l => history.push({ name: `${c.bank} ${c.name}`, time: l }));
            });
            history.sort((a,b) => new Date(b.time) - new Date(a.time));
            
            document.getElementById('historyView').innerHTML = history.map(h => `
                <div class="bg-white p-3 rounded-lg border-l-4 border-gray-300 flex justify-between">
                    <span class="text-gray-700">${h.name}</span>
                    <span class="text-gray-400 text-sm">${new Date(h.time).toLocaleDateString()}</span>
                </div>
            `).join('');
        }

        function closeModal() { document.getElementById('logModal').classList.add('hidden'); }
        function saveData() { localStorage.setItem('jcb_cards', JSON.stringify(cards)); }
        function showToast(msg) { /* 手機版簡易提醒 */ alert(msg); }
        function showResetConfirmation() { if(confirm('確定要清除所有紀錄嗎？')) { localStorage.clear(); location.reload(); } }

        // 啟動
        init();
    </script>
</body>
</html>
