<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0d0f14">
    <title>JCB 登錄管家 v1.21</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap">
    
    <style>
        :root {
            --bg: #0d0f14; --surface: #161920; --surface2: #1e2230; --border: #2a2f3d;
            --jcb-red: #e5001a; --jcb-red-dim: rgba(229,0,26,0.15);
            --jcb-green: #00c97a; --jcb-green-dim: rgba(0,201,122,0.12);
            --yellow: #f5c842; --yellow-dim: rgba(245,200,66,0.12);
            --blue: #4f8ef7; --blue-dim: rgba(79,142,247,0.13);
            --purple: #a78bfa; --purple-dim: rgba(167,139,250,0.13);
            --offline-orange: #ff9800; --text: #e8eaf0; --text-muted: #6b7280;
            --text-dim: #9ca3af; --teal: #2dd4bf; --teal-dim: rgba(45,212,191,0.10);
            --amber: #fb923c; --amber-dim: rgba(251,146,60,0.11);
            --pink: #f472b6; --pink-dim: rgba(244,114,182,0.11);
            --sky: #38bdf8; --sky-dim: rgba(56,189,248,0.11);
        }

        html, body { margin:0; padding:0; box-sizing:border-box; overscroll-behavior-y: contain; background:var(--bg); color:var(--text); font-family:'Noto Sans TC',sans-serif; min-height:100vh; }
        body { padding: 24px 16px 60px; }
        body.is-offline .header h1 { color: var(--offline-orange) !important; }
        body.is-offline .header h1::after { content: " (離線模式)"; font-size: 12px; margin-left: 8px; }

        /* Header & Badges */
        .header { text-align:center; margin-bottom:20px; }
        .header-logo { display:inline-flex; align-items:center; gap:10px; margin-bottom:6px; }
        .jcb-badge { background:var(--jcb-red); color:#fff; font-family:'DM Mono',monospace; font-size:13px; font-weight:500; letter-spacing:2px; padding:4px 10px; border-radius:4px; }
        .header h1 { font-size:22px; font-weight:700; margin:0; }
        .ver-tag { font-family:'DM Mono',monospace; font-size:10px; background:var(--purple-dim); color:var(--purple); padding:3px 8px; border-radius:20px; border:1px solid var(--purple); cursor:pointer; }
        .header-sub { font-size:12px; color:var(--text-muted); margin-top:4px; font-family: 'DM Mono', monospace; }

        /* Knowledge Panel */
        .knowledge-panel { border-radius:16px; margin-bottom:20px; border:1px solid var(--border); background:var(--surface); position:relative; overflow:hidden; }
        .knowledge-panel::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg, var(--kp-accent-start, #2dd4bf), var(--kp-accent-end, #38bdf8)); }
        .kp-inner { padding:16px 18px 14px; }
        .kp-header { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
        .kp-spark { font-size:20px; }
        .kp-label { font-size:10px; letter-spacing:2px; text-transform:uppercase; font-family:'DM Mono',monospace; flex:1; }
        .kp-tag { font-size:10px; font-family:'DM Mono',monospace; padding:2px 8px; border-radius:20px; border:1px solid; }
        .kp-shuffle, .kp-pause { width:28px; height:28px; border-radius:8px; border:1px solid var(--border); background:var(--surface2); color:var(--text-muted); cursor:pointer; display:flex; align-items:center; justify-content:center; }
        .kp-title { font-size:15px; font-weight:700; margin-bottom:8px; }
        .kp-body { font-size:12px; color:var(--text-dim); line-height:1.8; }
        .kp-highlight { padding:1px 6px; border-radius:5px; font-weight:600; }
        .kp-progress-track { width:100%; height:2px; background:var(--border); border-radius:99px; margin-top:12px; overflow:hidden; }
        .kp-progress-fill { height:100%; width:0%; background:linear-gradient(90deg, var(--kp-accent-start), var(--kp-accent-end)); }
        .kp-progress-fill.running { animation: kpProgress var(--kp-duration, 6s) linear forwards; }
        @keyframes kpProgress { from { width: 0%; } to { width: 100%; } }

        /* Notification Bar */
        .notif-bar { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 16px; margin-bottom:20px; display:flex; align-items:center; gap:12px; }
        .notif-bar-label { font-size:12px; color:var(--text-muted); flex:1; }
        .btn-notif, .btn-test-notif { padding:7px 14px; border-radius:8px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:12px; cursor:pointer; }

        /* Cards Grid */
        .section-title { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--text-muted); margin-bottom:12px; }
        .cards-grid { display:grid; grid-template-columns:1fr; gap:12px; margin-bottom:28px; }
        .card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px 18px; position:relative; }
        .card::before { content:''; position:absolute; top:0; left:0; width:3px; height:100%; background:var(--border); }
        .card.open-window::before { background:var(--jcb-green); }
        .card-top { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
        .card-icon { width:36px; height:36px; border-radius:8px; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:18px; }
        .card-name { font-size:14px; font-weight:500; }
        .card-status { font-size:11px; margin-left:auto; padding:3px 8px; border-radius:20px; }
        .badge-ok { background:var(--jcb-green-dim); color:var(--jcb-green); }
        .btn-register { flex:1; padding:9px 14px; border-radius:9px; border:none; background:var(--surface2); color:var(--text-muted); cursor:pointer; font-weight:500; }
        .btn-register.can { background:var(--jcb-green); color:#0d0f14; }

        /* Summary & Toast */
        .summary { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 20px; }
        #toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--surface2); padding:10px 20px; border-radius:30px; opacity:0; transition:0.3s; z-index:999; }
        #toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
        
        .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.8); z-index:1000; align-items:center; justify-content:center; }
        .modal-bg.show { display:flex; }
        .modal { background:var(--surface); padding:24px; border-radius:16px; width:90%; max-width:340px; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-logo">
        <span class="jcb-badge">JCB</span>
        <h1>登錄管家</h1>
    </div>
    <div>
        <span class="ver-tag">v1.21</span>
        <div class="header-sub" id="current-date">正在載入時間...</div>
    </div>
</div>

<div class="knowledge-panel" id="knowledge-panel">
    <div class="kp-inner">
        <div class="kp-header">
            <span class="kp-spark" id="kp-spark">✨</span>
            <span class="kp-label" id="kp-label">小撇步</span>
            <span class="kp-tag" id="kp-tag">技巧</span>
            <button class="kp-pause" id="kp-pause" onclick="toggleKpPause()">⏸</button>
            <button class="kp-shuffle" onclick="kpManualNext()">⟳</button>
        </div>
        <div id="kp-content-wrap">
            <div class="kp-title" id="kp-title">歡迎使用</div>
            <div class="kp-body" id="kp-body">正在準備您的 JCB 攻略...</div>
        </div>
        <div class="kp-progress-track"><div class="kp-progress-fill" id="kp-progress"></div></div>
    </div>
</div>

<div class="notif-bar">
    <div class="notif-bar-label">🔔 通知提醒狀態</div>
    <button class="btn-notif" id="btn-notif" onclick="requestNotif()">開啟</button>
    <button class="btn-test-notif" onclick="testNotif()">測試</button>
</div>

<div class="section-title">我的 JCB 卡片</div>
<div class="cards-grid" id="cards-grid"></div>

<div class="summary" id="summary"></div>

<div id="toast"></div>

<div id="offline-indicator" style="display:none; position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:var(--offline-orange); color:#000; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:700; z-index:999;">
    ⚠️ 目前處於離線模式
</div>

<script>
// --- 資料定義 ---
const KNOWLEDGE = [
    { spark:'🚇', label:'悠遊卡新制', tag:'登錄制度', accent:['#2dd4bf','#38bdf8'], title:'悠遊卡 10% 回饋：一年只有 3 次機會', body:'新光悠遊 JCB 每月需登錄。建議選第一期確保整月有效。' },
    { spark:'✈️', label:'機場接送', tag:'隱藏福利', accent:['#fb923c','#f59e0b'], title:'JCB 白金卡：免費機場接送', body:'多家銀行提供每年 2～4 次免費接送，需提早預約。' },
    { spark:'🗾', label:'日本旅遊', tag:'境外回饋', accent:['#f472b6','#a78bfa'], title:'日本主場：回饋比他牌更高', body:'日幣結算通常有加碼，搭配熊本熊卡效果最佳。' }
];

const CARDS = [
    { id:'federal_breezy', bank:'聯邦銀行', name:'微風 JCB', icon:'🌿' },
    { id:'ctbc_lala', bank:'中國信託', name:'LALAPORT JCB', icon:'🛍️' },
    { id:'esun_kumamon', bank:'玉山銀行', name:'熊本熊 JCB', icon:'🐻' },
    { id:'skb_easycard', bank:'新光銀行', name:'新光悠遊 JCB', icon:'🚇' }
];

const WINDOWS = [
    { label:'第一期', start:[1,9,0], end:[5,18,0] },
    { label:'第二期', start:[11,9,0], end:[15,18,0] },
    { label:'第三期', start:[21,9,0], end:[25,18,0] }
];

// --- 核心邏輯 ---
let data = JSON.parse(localStorage.getItem('jcb_v4')) || {};
let kpIndex = Math.floor(Math.random() * KNOWLEDGE.length);
let kpPaused = false;
let kpTimer;

function save() { localStorage.setItem('jcb_v4', JSON.stringify(data)); }

function isNowInWindow() {
    const t = new Date(), day = t.getDate(), h = t.getHours();
    return WINDOWS.some(w => day >= w.start[0] && day <= w.end[0] && (day > w.start[0] || h >= w.start[1]));
}

function render() {
    const t = new Date();
    document.getElementById('current-date').textContent = `${t.getFullYear()}/${t.getMonth()+1}/${t.getDate()} ${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
    
    const grid = document.getElementById('cards-grid');
    const inWin = isNowInWindow();
    
    grid.innerHTML = CARDS.map(c => {
        const count = (data[c.id] || []).length;
        return `
            <div class="card ${inWin ? 'open-window' : ''}">
                <div class="card-top">
                    <div class="card-icon">${c.icon}</div>
                    <div class="card-name">${c.name}</div>
                    <span class="card-status ${inWin ? 'badge-ok' : ''}">${inWin ? '可登錄' : '待機中'}</span>
                </div>
                <div style="display:flex; align-items:center;">
                    <div style="font-size:12px; color:var(--text-muted);">年度次數：${count}/3</div>
                    <button class="btn-register ${inWin ? 'can' : ''}" style="margin-left:auto;">${inWin ? '確認登錄' : '尚未開始'}</button>
                </div>
            </div>`;
    }).join('');

    document.getElementById('summary').innerHTML = `<div style="font-size:12px; text-align:center; color:var(--text-muted);">本月已登錄 ${Object.keys(data).length} 張卡片</div>`;
}

// --- 知識看板 ---
function renderKnowledge(idx) {
    const k = KNOWLEDGE[idx];
    const el = document.getElementById('knowledge-panel');
    el.style.setProperty('--kp-accent-start', k.accent[0]);
    el.style.setProperty('--kp-accent-end', k.accent[1]);
    document.getElementById('kp-spark').textContent = k.spark;
    document.getElementById('kp-title').textContent = k.title;
    document.getElementById('kp-body').textContent = k.body;
}

function kpStartProgress() {
    if (kpPaused) return;
    const bar = document.getElementById('kp-progress');
    bar.classList.remove('running');
    void bar.offsetWidth;
    bar.classList.add('running');
    clearTimeout(kpTimer);
    kpTimer = setTimeout(() => {
        kpIndex = (kpIndex + 1) % KNOWLEDGE.length;
        renderKnowledge(kpIndex);
        kpStartProgress();
    }, 6000);
}

function toggleKpPause() {
    kpPaused = !kpPaused;
    document.getElementById('kp-pause').textContent = kpPaused ? '▶' : '⏸';
    if (!kpPaused) kpStartProgress();
}

function kpManualNext() {
    kpIndex = (kpIndex + 1) % KNOWLEDGE.length;
    renderKnowledge(kpIndex);
    kpStartProgress();
}

// --- 初始化 ---
window.addEventListener('DOMContentLoaded', () => {
    render();
    renderKnowledge(kpIndex);
    kpStartProgress();
    
    // 監測離線狀態
    const updateStatus = () => {
        document.body.classList.toggle('is-offline', !navigator.onLine);
        document.getElementById('offline-indicator').style.display = navigator.onLine ? 'none' : 'block';
    };
    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);
    updateStatus();
});

// SW 註冊
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').then(() => console.log("SW OK"));
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
