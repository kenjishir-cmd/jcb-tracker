<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0f14">
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JCB 登錄管家 v1.21</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2230;
    --border: #2a2f3d;
    --jcb-red: #e5001a;
    --jcb-red-dim: rgba(229,0,26,0.15);
    --jcb-green: #00c97a;
    --jcb-green-dim: rgba(0,201,122,0.12);
    --yellow: #f5c842;
    --yellow-dim: rgba(245,200,66,0.12);
    --blue: #4f8ef7;
    --blue-dim: rgba(79,142,247,0.13);
    --purple: #a78bfa;
    --purple-dim: rgba(167,139,250,0.13);
    --offline-orange: #ff9800;
    --text: #e8eaf0;
    --text-muted: #6b7280;
    --text-dim: #9ca3af;
    /* 知識看板專屬 */
    --teal: #2dd4bf;
    --teal-dim: rgba(45,212,191,0.10);
    --amber: #fb923c;
    --amber-dim: rgba(251,146,60,0.11);
    --pink: #f472b6;
    --pink-dim: rgba(244,114,182,0.11);
    --sky: #38bdf8;
    --sky-dim: rgba(56,189,248,0.11);
  }

  html, body {
    margin:0; padding:0; box-sizing:border-box;
    overscroll-behavior-y: contain;
  }
  body {
    background:var(--bg); color:var(--text);
    font-family:'Noto Sans TC',sans-serif;
    min-height:100vh; padding:24px 16px 60px;
  }

  body.is-offline .header h1 { color: var(--offline-orange) !important; }
  body.is-offline .header h1::after { content: " (離線模式)"; font-size: 12px; margin-left: 8px; vertical-align: middle; }

  .header { text-align:center; margin-bottom:20px; position:relative; z-index:300; }
  .header-logo { display:inline-flex; align-items:center; gap:10px; margin-bottom:6px; }
  .jcb-badge {
    background:var(--jcb-red); color:#fff;
    font-family:'DM Mono',monospace; font-size:13px; font-weight:500;
    letter-spacing:2px; padding:4px 10px; border-radius:4px;
  }
  .header h1 { font-size:22px; font-weight:700; letter-spacing:1px; transition: color 0.3s; }

  .ver-wrap { position:relative; display:inline-flex; align-items:center; }
  .ver-tag {
    font-family:'DM Mono',monospace; font-size:10px;
    background:var(--purple-dim); color:var(--purple);
    padding:3px 8px; border-radius:20px; border:1px solid var(--purple);
    cursor:pointer; user-select:none; transition:background .15s;
    display:inline-flex; align-items:center; gap:4px;
  }
  .ver-tag:hover { background:rgba(167,139,250,0.22); }
  .ver-tag::before { content:'◆'; font-size:7px; }
  .ver-tooltip {
    display:none; position:fixed; top:auto; left:50%;
    transform:translateX(-50%);
    background:var(--surface); border:1px solid var(--purple);
    border-radius:12px; padding:14px 16px; min-width:240px; max-width:90vw;
    box-shadow:0 8px 32px rgba(0,0,0,.7);
    z-index:9999; text-align:left;
  }
  .ver-tooltip::before { display:none; }
  .ver-tooltip.show { display:block; animation:fadeInVt .15s ease; }
  @keyframes fadeInVt { from{opacity:0} to{opacity:1} }
  .vt-version { font-family:'DM Mono',monospace; font-size:18px; font-weight:700; color:var(--purple); margin-bottom:2px; }
  .vt-date { font-size:10px; color:var(--text-muted); font-family:'DM Mono',monospace; margin-bottom:10px; }
  .vt-divider { border:none; border-top:1px solid var(--border); margin:8px 0; }
  .vt-label { font-size:10px; color:var(--purple); letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; font-weight:600; }
  .vt-item { font-size:11px; color:var(--text-dim); line-height:1.7; padding-left:10px; position:relative; }
  .vt-item::before { content:'·'; position:absolute; left:0; color:var(--purple); }

  .header-sub { font-size:12px; color:var(--text-muted); margin-top:4px; font-family: 'DM Mono', monospace; }

  /* =============================================
     智慧知識看板
  ============================================= */
  .knowledge-panel {
    border-radius:16px; padding:0; margin-bottom:20px;
    position:relative; overflow:hidden;
    border:1px solid var(--border);
    background:var(--surface);
  }

  /* 頂部色帶 */
  .knowledge-panel::before {
    content:''; position:absolute; top:0; left:0; right:0;
    height:3px;
    background:linear-gradient(90deg, var(--kp-accent-start), var(--kp-accent-end));
    transition:background 0.4s;
  }

  .kp-inner { padding:16px 18px 14px; }

  .kp-header {
    display:flex; align-items:center; gap:8px; margin-bottom:10px;
  }
  .kp-spark {
    font-size:20px; line-height:1; flex-shrink:0;
    filter: drop-shadow(0 0 6px var(--kp-glow));
  }
  .kp-label {
    font-size:10px; letter-spacing:2px; text-transform:uppercase;
    font-family:'DM Mono',monospace; font-weight:500;
    flex:1;
  }
  .kp-tag {
    font-size:10px; font-family:'DM Mono',monospace;
    padding:2px 8px; border-radius:20px; border:1px solid;
    white-space:nowrap;
  }
  .kp-shuffle {
    width:28px; height:28px; border-radius:8px; border:1px solid var(--border);
    background:var(--surface2); color:var(--text-muted); font-size:13px;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:all .15s; flex-shrink:0;
  }
  .kp-shuffle:hover { border-color:var(--purple); color:var(--purple); transform:rotate(20deg); }

  .kp-title {
    font-size:15px; font-weight:700; line-height:1.45; margin-bottom:8px;
  }
  .kp-body {
    font-size:12px; color:var(--text-dim); line-height:1.8;
  }
  .kp-highlight {
    display:inline-block; padding:1px 6px; border-radius:5px;
    font-weight:600; font-size:11px;
  }

  .kp-divider { border:none; border-top:1px solid var(--border); margin:12px 0 10px; }

  .kp-tips-label {
    font-size:10px; color:var(--text-muted); letter-spacing:1px;
    text-transform:uppercase; font-family:'DM Mono',monospace; margin-bottom:8px;
  }
  .kp-tips { display:flex; flex-wrap:wrap; gap:6px; }
  .kp-tip-pill {
    font-size:11px; padding:4px 10px; border-radius:20px;
    border:1px solid var(--border); background:var(--surface2);
    color:var(--text-dim); line-height:1.4; cursor:pointer; transition:all .15s;
  }
  .kp-tip-pill:hover { border-color:var(--purple); color:var(--purple); background:var(--purple-dim); }

  .kp-footer {
    display:flex; align-items:center; justify-content:space-between;
    margin-top:12px; padding-top:10px; border-top:1px solid var(--border);
  }
  .kp-dots { display:flex; gap:5px; }
  .kp-dot {
    width:6px; height:6px; border-radius:50%;
    background:var(--border); transition:all .3s;
  }
  .kp-dot.active {
    background:var(--kp-accent-start); width:16px; border-radius:3px;
  }
  .kp-counter {
    font-family:'DM Mono',monospace; font-size:10px; color:var(--text-muted);
  }

  /* 淡入動畫 */
  @keyframes kpSlideIn {
    from { opacity:0; transform:translateY(6px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .kp-content-wrap { animation:kpSlideIn .28s ease; }

  /* 進度條 */
  .kp-progress-track {
    width:100%; height:2px; background:var(--border);
    border-radius:99px; overflow:hidden; margin-top:12px;
  }
  .kp-progress-fill {
    height:100%; border-radius:99px; width:0%;
    background:linear-gradient(90deg, var(--kp-accent-start), var(--kp-accent-end));
    transition: background 0.4s;
  }
  .kp-progress-fill.running {
    animation: kpProgress var(--kp-duration, 6s) linear forwards;
  }
  @keyframes kpProgress {
    from { width: 0%; }
    to   { width: 100%; }
  }

  /* 暫停按鈕 */
  .kp-pause {
    width:28px; height:28px; border-radius:8px; border:1px solid var(--border);
    background:var(--surface2); color:var(--text-muted); font-size:11px;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:all .15s; flex-shrink:0; font-family:'DM Mono',monospace;
  }
  .kp-pause:hover { border-color:var(--yellow); color:var(--yellow); }
  .kp-pause.paused { border-color:var(--yellow); color:var(--yellow); background:var(--yellow-dim); }

  /* =============================================
     其餘原版樣式（不動）
  ============================================= */
  #reminder-banner {
    display:none; border-radius:12px; padding:14px 18px; margin-bottom:20px;
    border:1px solid; position:relative; overflow:hidden;
  }
  #reminder-banner.warn { background:var(--yellow-dim); border-color:var(--yellow); }
  #reminder-banner.go   { background:var(--jcb-green-dim); border-color:var(--jcb-green); }
  #reminder-banner.info { background:var(--blue-dim); border-color:var(--blue); }
  .banner-icon { font-size:20px; margin-bottom:4px; }
  .banner-title { font-size:14px; font-weight:700; margin-bottom:4px; }
  #reminder-banner.warn .banner-title { color:var(--yellow); }
  #reminder-banner.go   .banner-title { color:var(--jcb-green); }
  #reminder-banner.info .banner-title { color:var(--blue); }
  .banner-body { font-size:12px; color:var(--text-dim); line-height:1.7; }
  .banner-close {
    position:absolute; top:10px; right:12px;
    background:none; border:none; color:var(--text-muted);
    font-size:16px; cursor:pointer; line-height:1;
  }

  .notif-bar {
    background:var(--surface); border:1px solid var(--border);
    border-radius:10px; padding:12px 16px; margin-bottom:20px;
    display:flex; align-items:center; gap:12px; flex-wrap:wrap;
  }
  .notif-bar-label { font-size:12px; color:var(--text-muted); flex:1; }
  .notif-status { font-size:11px; font-family:'DM Mono',monospace; }
  .notif-status.granted { color:var(--jcb-green); }
  .notif-status.denied  { color:var(--jcb-red); }
  .notif-status.default { color:var(--yellow); }
  .btn-notif {
    padding:7px 14px; border-radius:8px; border:1px solid var(--border);
    background:var(--surface2); color:var(--text); font-size:12px;
    cursor:pointer; font-family:'Noto Sans TC',sans-serif; transition:all .15s; white-space:nowrap;
  }
  .btn-notif:hover { border-color:var(--blue); color:var(--blue); }
  .btn-test-notif {
    padding:7px 14px; border-radius:8px; border:1px solid var(--border);
    background:transparent; color:var(--text-muted); font-size:12px;
    cursor:pointer; font-family:'Noto Sans TC',sans-serif; transition:all .15s; white-space:nowrap;
  }
  .btn-test-notif:hover { border-color:var(--jcb-green); color:var(--jcb-green); }

  .period-bar {
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; padding:14px 20px; margin-bottom:24px;
    display:flex; align-items:center; gap:12px; flex-wrap:wrap;
  }
  .period-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; animation:pulse 2s infinite; }
  .period-dot.open  { background:var(--jcb-green); box-shadow:0 0 8px var(--jcb-green); }
  .period-dot.closed{ background:var(--text-muted); animation:none; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
  .period-info { flex:1; }
  .period-status { font-size:13px; font-weight:500; }
  .period-status.open   { color:var(--jcb-green); }
  .period-status.closed { color:var(--text-muted); }
  .period-next { font-size:11px; color:var(--text-muted); margin-top:2px; }
  .period-countdown {
    font-family:'DM Mono',monospace; font-size:12px;
    color:var(--yellow); background:var(--yellow-dim); padding:4px 10px; border-radius:6px;
  }
  .period-windows { width:100%; display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  .pw {
    flex:1; min-width:110px; background:var(--surface2); border:1px solid var(--border);
    border-radius:8px; padding:8px 10px; font-size:11px; color:var(--text-muted); text-align:center;
  }
  .pw.active { border-color:var(--jcb-green); color:var(--jcb-green); background:var(--jcb-green-dim); }
  .pw-label { font-weight:500; margin-bottom:2px; }

  .section-title {
    font-size:11px; letter-spacing:2px; text-transform:uppercase;
    color:var(--text-muted); margin-bottom:12px; padding-left:4px;
  }

  .cards-grid { display:grid; grid-template-columns:1fr; gap:12px; margin-bottom:28px; }
  .card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:14px; padding:16px 18px;
    transition:border-color .2s; position:relative; overflow:hidden;
  }
  .card::before {
    content:''; position:absolute; top:0; left:0;
    width:3px; height:100%; background:var(--border); transition:background .2s;
  }
  .card.maxed::before        { background:var(--jcb-red); }
  .card.monthly-done::before { background:var(--yellow); }
  .card.open-window::before  { background:var(--jcb-green); }

  .card-top { display:flex; align-items:flex-start; gap:12px; margin-bottom:12px; }
  .card-icon {
    width:36px; height:36px; border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    font-size:18px; flex-shrink:0; background:var(--surface2);
  }
  .card-meta { flex:1; }
  .card-name { font-size:14px; font-weight:500; line-height:1.3; }
  .card-bank { font-size:11px; color:var(--text-muted); margin-top:2px; }

  .pips { display:flex; gap:5px; align-items:center; }
  .pip {
    width:22px; height:22px; border-radius:50%; border:2px solid var(--border);
    display:flex; align-items:center; justify-content:center; font-size:10px; transition:all .15s;
  }
  .pip.used { background:var(--jcb-red); border-color:var(--jcb-red); color:#fff; }
  .pip-count { font-size:10px; color:var(--text-muted); margin-left:6px; font-family:'DM Mono',monospace; }

  .card-status { font-size:11px; font-weight:500; padding:3px 8px; border-radius:20px; white-space:nowrap; flex-shrink:0; }
  .badge-maxed   { background:var(--jcb-red-dim); color:var(--jcb-red); }
  .badge-monthly { background:var(--yellow-dim);  color:var(--yellow); }
  .badge-ok      { background:var(--jcb-green-dim); color:var(--jcb-green); }
  .badge-closed  { background:rgba(107,114,128,.15); color:var(--text-muted); }

  .card-bottom { display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .btn-register {
    flex:1; padding:9px 14px; border-radius:9px; border:none;
    font-family:'Noto Sans TC',sans-serif; font-size:13px; font-weight:500;
    cursor:pointer; transition:all .15s;
  }
  .btn-register.can      { background:var(--jcb-green); color:#0d0f14; }
  .btn-register.can:hover{ background:#00e688; transform:translateY(-1px); }
  .btn-register.disabled { background:var(--surface2); color:var(--text-muted); cursor:not-allowed; }

  .btn-retro {
    padding:9px 11px; border-radius:9px; border:1px solid var(--purple);
    background:var(--purple-dim); color:var(--purple); font-size:12px;
    cursor:pointer; transition:all .15s; white-space:nowrap;
    font-family:'Noto Sans TC',sans-serif; font-weight:500;
  }
  .btn-retro:hover { background:rgba(167,139,250,0.22); }

  .btn-undo {
    padding:9px 10px; border-radius:9px; border:1px solid var(--border);
    background:transparent; color:var(--text-muted); font-size:12px;
    cursor:pointer; transition:all .15s; white-space:nowrap;
    font-family:'Noto Sans TC',sans-serif;
  }
  .btn-undo:hover { border-color:var(--jcb-red); color:var(--jcb-red); }
  .btn-undo.pending {
    border-color:var(--jcb-red); color:var(--jcb-red);
    background:var(--jcb-red-dim);
  }

  .undo-confirm-bar {
    display:flex; align-items:center; gap:8px;
    background:var(--jcb-red-dim); border:1px solid var(--jcb-red);
    border-radius:10px; padding:10px 14px; margin-top:10px;
    animation:slideDown .18s ease;
  }
  @keyframes slideDown {
    from { opacity:0; transform:translateY(-6px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .undo-confirm-text { flex:1; font-size:12px; color:var(--jcb-red); font-weight:500; }
  .undo-confirm-sub { font-size:10px; color:var(--text-muted); font-family:'DM Mono',monospace; margin-top:2px; }
  .btn-undo-yes {
    padding:7px 14px; border-radius:8px; border:none;
    background:var(--jcb-red); color:#fff; font-size:12px; font-weight:600;
    cursor:pointer; font-family:'Noto Sans TC',sans-serif; transition:all .15s; white-space:nowrap;
  }
  .btn-undo-yes:hover { background:#ff1f36; }
  .btn-undo-no {
    padding:7px 12px; border-radius:8px; border:1px solid var(--border);
    background:transparent; color:var(--text-muted); font-size:12px;
    cursor:pointer; font-family:'Noto Sans TC',sans-serif; transition:all .15s; white-space:nowrap;
  }
  .btn-undo-no:hover { border-color:var(--text-dim); color:var(--text); }

  .log-entry { font-size:11px; color:var(--text-muted); margin-top:8px; font-family:'DM Mono',monospace; line-height:1.9; }
  .log-retro { color: var(--purple) !important; }

  .summary { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 20px; }
  .summary-title { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--text-muted); margin-bottom:12px; }
  .summary-row { display:flex; justify-content:space-between; font-size:12px; color:var(--text-dim); margin-bottom:6px; }
  .summary-val { font-family:'DM Mono',monospace; color:var(--text); }

  .progress-section { margin-top:18px; padding-top:16px; border-top:1px solid var(--border); }
  .progress-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px; }
  .progress-label { font-size:12px; color:var(--text-dim); font-weight:500; }
  .progress-fraction { font-family:'DM Mono',monospace; font-size:13px; color:var(--text); }
  .progress-track { height:10px; background:var(--surface2); border-radius:99px; overflow:hidden; margin-bottom:5px; }
  .progress-fill {
    height:100%; border-radius:99px;
    background:linear-gradient(90deg,#00c97a,#00e688);
    transition:width .7s cubic-bezier(.4,0,.2,1); position:relative;
  }
  .progress-fill::after {
    content:''; position:absolute; right:0; top:0;
    width:6px; height:100%; background:rgba(255,255,255,.3); border-radius:99px;
  }

  .card-bar-row { margin-bottom:12px; }
  .card-bar-name { font-size:11px; color:var(--text-dim); display:flex; justify-content:space-between; margin-bottom:4px; width:100%; }
  .card-bar-track { height:6px; background:var(--surface2); border-radius:99px; overflow:hidden; }
  .card-bar-fill { height:100%; border-radius:99px; transition:width .5s ease; }
  .fn0 { width:0%; }
  .fn1 { width:33%; background:var(--jcb-green); }
  .fn2 { width:66%; background:var(--yellow); }
  .fn3 { width:100%; background:var(--jcb-red); }

  #toast {
    position:fixed; bottom:24px; left:50%;
    transform:translateX(-50%) translateY(80px);
    background:var(--surface2); border:1px solid var(--border);
    color:var(--text); padding:10px 20px; border-radius:30px;
    font-size:13px; z-index:999;
    transition:transform .3s ease, opacity .3s;
    opacity:0; pointer-events:none; white-space:nowrap;
  }
  #toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

  .btn-reset {
    display:block; margin:20px auto 0;
    background:none; border:1px solid var(--border); color:var(--text-muted);
    font-size:11px; padding:6px 16px; border-radius:20px; cursor:pointer;
    font-family:'Noto Sans TC',sans-serif; transition:all .15s;
  }
  .btn-reset:hover { border-color:var(--jcb-red); color:var(--jcb-red); }

  .modal-bg {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,.78); z-index:100; align-items:center; justify-content:center;
  }
  .modal-bg.show { display:flex; }
  .modal {
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:24px; max-width:340px; width:92%;
  }
  .modal h3 { font-size:16px; margin-bottom:4px; }
  .modal-sub { font-size:12px; color:var(--text-muted); margin-bottom:18px; }
  .picker-label { font-size:11px; letter-spacing:1px; color:var(--text-muted); text-transform:uppercase; margin-bottom:8px; }

  .window-picker { margin-bottom:18px; }
  .window-options { display:flex; flex-direction:column; gap:7px; }
  .window-opt {
    display:flex; align-items:center; gap:10px;
    background:var(--surface2); border:1.5px solid var(--border);
    border-radius:10px; padding:10px 14px; cursor:pointer; transition:all .15s;
  }
  .window-opt:hover { border-color:var(--jcb-green); }

  labelEl.style.color = k.theme.tagColor;

  const tagEl = document.getElementById('kp-tag');
  tagEl.textContent = k.theme.tag;
  tagEl.style.color = k.theme.tagColor;
  tagEl.style.borderColor = k.theme.tagColor;
  tagEl.style.background = k.theme.bg;

  // 重建 content-wrap 觸發動畫
  const wrap = document.getElementById('kp-content-wrap');
  wrap.style.animation = 'none';
  wrap.offsetHeight;
  wrap.style.animation = '';

  document.getElementById('kp-title').textContent = k.title;
  document.getElementById('kp-body').innerHTML = k.body;

  // dots（5個循環顯示）
  const dotsEl = document.getElementById('kp-dots');
  const DOTS_SHOW = 5;
  let dotsHTML = '';
  for (let i = 0; i < DOTS_SHOW; i++) {
    dotsHTML += `<div class="kp-dot${i === (idx % DOTS_SHOW) ? ' active' : ''}" onclick="kpJumpTo(${i}, ${idx})"></div>`;
  }
  dotsEl.innerHTML = dotsHTML;
  dotsEl.style.setProperty('--kp-accent-start', k.theme.accent[0]);

  document.getElementById('kp-counter').textContent = (idx + 1) + ' / ' + KNOWLEDGE.length;
}

// 進度條控制
function kpStartProgress(fromElapsed) {
  const bar = document.getElementById('kp-progress');
  const remaining = KP_DURATION - (fromElapsed || 0);
  const startPct = ((fromElapsed || 0) / KP_DURATION) * 100;

  bar.style.transition = 'none';
  bar.style.animation = 'none';
  bar.style.width = startPct + '%';
  bar.offsetHeight; // reflow

  // 設定 CSS var 讓 animation duration = 剩餘時間
  bar.style.setProperty('--kp-duration', (remaining / 1000) + 's');
  bar.classList.remove('running');
  bar.offsetHeight;
  bar.classList.add('running');

  kpProgressStart = Date.now() - (fromElapsed || 0);

  clearTimeout(kpTimer);
  kpTimer = setTimeout(() => {
    kpElapsed = 0;
    kpIndex = (kpIndex + 1) % KNOWLEDGE.length;
    renderKnowledge(kpIndex);
    if (!kpPaused) kpStartProgress(0);
  }, remaining);
}

function kpStopProgress() {
  clearTimeout(kpTimer);
  const bar = document.getElementById('kp-progress');
  // 記錄目前進度
  kpElapsed = kpProgressStart ? Date.now() - kpProgressStart : 0;
  if (kpElapsed > KP_DURATION) kpElapsed = KP_DURATION;
  // 凍結進度條
  const pct = (kpElapsed / KP_DURATION) * 100;
  bar.classList.remove('running');
  bar.style.animation = 'none';
  bar.style.width = pct + '%';
}

function toggleKpPause() {
  kpPaused = !kpPaused;
  const btn = document.getElementById('kp-pause');
  if (kpPaused) {
    btn.textContent = '▶';
    btn.classList.add('paused');
    btn.title = '繼續播放';
    kpStopProgress();
  } else {
    btn.textContent = '⏸';
    btn.classList.remove('paused');
    btn.title = '暫停';
    kpStartProgress(kpElapsed);
  }
}

function kpManualNext() {
  kpElapsed = 0;
  kpIndex = (kpIndex + 1) % KNOWLEDGE.length;
  renderKnowledge(kpIndex);
  if (!kpPaused) kpStartProgress(0);
  else {
    // 暫停中手動切換：重置進度條但不啟動
    const bar = document.getElementById('kp-progress');
    bar.classList.remove('running');
    bar.style.animation = 'none';
    bar.style.width = '0%';
  }
}

function shuffleKnowledge() { kpManualNext(); }

const KEY = 'jcb_v4';
function loadData() {
  try { const s=localStorage.getItem(KEY); if(s) return JSON.parse(s); } catch {}
  const d=JSON.parse(JSON.stringify(PRESET));
  localStorage.setItem(KEY,JSON.stringify(d)); return d;
}
function save(d) { localStorage.setItem(KEY,JSON.stringify(d)); }
let data = loadData();
let undoPendingId = null;

function now() { return new Date(); }
function ymKey(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }

function inWindow(date) {
  const day=date.getDate(), m=date.getHours()*60+date.getMinutes();
  return WINDOWS.some(w => {
    const s=w.start[1]*60, e=w.end[1]*60;
    return day>=w.start[0]&&day<=w.end[0]&&(day>w.start[0]||m>=s)&&(day<w.end[0]||m<=e);
  });
}
function curWin(date) {
  const day=date.getDate(), m=date.getHours()*60+date.getMinutes();
  return WINDOWS.findIndex(w => {
    const s=w.start[1]*60, e=w.end[1]*60;
    return day>=w.start[0]&&day<=w.end[0]&&(day>w.start[0]||m>=s)&&(day<w.end[0]||m<=e);
  });
}
function nextWin(date) {
  const day=date.getDate(), m=date.getHours()*60+date.getMinutes();
  for (const w of WINDOWS) {
    const s=w.start[1]*60;
    if (day<w.start[0]||(day===w.start[0]&&m<s))
      return {label:w.label, daysLeft:w.start[0]-day, startDay:w.start[0], startH:w.start[1]};
  }
  return null;
}

function regs(id)  { return data[id]||[]; }
function total(id) { return regs(id).length; }
function usedMonth(id, ym) { return regs(id).some(r=>r.month===ym||r.month.startsWith(ym)); }
function canReg(id) {
  const t=now(), ym=ymKey(t);
  if (total(id)>=3)      return {ok:false, msg:'全年已滿'};
  if (usedMonth(id, ym)) return {ok:false, msg:'本月已報'};
  if (!inWindow(t))      return {ok:false, msg:'時段未開'};
  return {ok:true};
}
function doReg(id, dateLabel, ym) {
  if (!data[id]) data[id]=[];
  data[id].push({month:ym, date:dateLabel});
  save(data); render();
}

function requestUndo(id) {
  undoPendingId = (undoPendingId === id) ? null : id;
  render();
}
function confirmUndo(id) {
  if (!data[id] || !data[id].length) return;
  data[id].pop();
  save(data);
  undoPendingId = null;
  showToast('已撤銷最後一筆登錄');
  render();
}
function cancelUndo() {
  undoPendingId = null;
  render();
}

function anyRegInMonth(id, ym) {
  return regs(id).some(r => r.month === ym || r.month.startsWith(ym));
}

function getReminderState() {
  const t=now(), ym=ymKey(t), open=inWindow(t), wi=curWin(t);
  const eligible=CARDS.filter(c=>total(c.id)<3&&!usedMonth(c.id,ym));
  if (open && eligible.length>0) {
    const w=WINDOWS[wi];
    return {type:'go', icon:'🟢',
      title:`現在可以登錄！${w.label}進行中`,
      body:`共 ${eligible.length} 張卡尚未登錄：${eligible.map(c=>c.name).join('、')}`};
  }
  return null;
}

function updateNotifUI() {

  const dateLabel=`${yr}/${mo}/${String(w.start[0]).padStart(2,'0')} ${w.label}【補登】`;
  let monthKey=retroSelMonth;
  const existing=regs(retroCardId).filter(r=>r.month===retroSelMonth||r.month.startsWith(retroSelMonth));
  if(existing.length>0) monthKey=retroSelMonth+(existing.length===1?'a':'b');
  doReg(retroCardId, dateLabel, monthKey);
  closeRetroModal(); showToast('✓ 補登成功');
}

function confirmReset(){
  if(!confirm('確定要清除所有登錄紀錄嗎？')) return;
  data={}; save(data); render(); showToast('已重置');
}

let tTimer;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(tTimer); tTimer=setTimeout(()=>el.classList.remove('show'),2800);
}

function toggleFooterVer(e) {
  e.stopPropagation();
  const vt = document.getElementById('ver-tooltip');
  const tag = e.currentTarget;
  const rect = tag.getBoundingClientRect();
  const isShow = vt.classList.contains('show');
  vt.classList.remove('show');
  if (!isShow) {
    const tooltipW = 248;
    let left = rect.left + rect.width / 2 - tooltipW / 2;
    if (left < 8) left = 8;
    if (left + tooltipW > window.innerWidth - 8) left = window.innerWidth - tooltipW - 8;
    // 底部版本：tooltip 往上彈出
    vt.style.left = left + 'px';
    vt.style.top = (rect.top - 8) + 'px';
    vt.style.transform = 'translateY(-100%)';
    vt.classList.add('show');
  }
}
function toggleVerTooltip(e) {
  e.stopPropagation();
  const vt = document.getElementById('ver-tooltip');
  const tag = e.currentTarget;
  const rect = tag.getBoundingClientRect();
  const isShow = vt.classList.contains('show');
  vt.classList.remove('show');
  if (!isShow) {
    const tooltipW = 248;
    let left = rect.left + rect.width / 2 - tooltipW / 2;
    if (left < 8) left = 8;
    if (left + tooltipW > window.innerWidth - 8) left = window.innerWidth - tooltipW - 8;
    vt.style.left = left + 'px';
    vt.style.top = (rect.bottom + 8) + 'px';
    vt.style.transform = 'none';
    vt.classList.add('show');
  }
}
document.addEventListener('click', () => {
  const vt = document.getElementById('ver-tooltip');
  if (vt) vt.classList.remove('show');
});

function render(){
  const t=now();
  const weekDays = ['週日', '週一', '週二', '週三', '週四', '週五', '週六'];
  const dayName = weekDays[t.getDay()];
  document.getElementById('current-date').textContent =
    t.getFullYear() + ' 年 ' + (t.getMonth() + 1) + ' 月 ' + t.getDate() + ' 日 (' + dayName + ') ' +
    String(t.getHours()).padStart(2, '0') + ':' + String(t.getMinutes()).padStart(2, '0');
  renderPeriodBar(); renderCards(); renderSummary(); renderBanner(); updateNotifUI();
}

// 初始化知識看板（隨機起點 + 啟動自動輪播）
renderKnowledge(kpIndex);
kpStartProgress(0);
render();
setInterval(render, 60000);
</script>
