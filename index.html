<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0f14">
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JCB 登錄管家 v1.20</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2230;
    --border: #2a2f3d;
    --jcb-red: #e5001a;
    --jcb-red-dim: rgba(229,0,26,0.15);
    --jcb-green: #00c97a;
    --jcb-green-dim: rgba(0,201,122,0.12);
    --yellow: #f5c842;
    --yellow-dim: rgba(245,200,66,0.12);
    --blue: #4f8ef7;
    --blue-dim: rgba(79,142,247,0.13);
    --purple: #a78bfa;
    --purple-dim: rgba(167,139,250,0.13);
    --offline-orange: #ff9800;
    --text: #e8eaf0;
    --text-muted: #6b7280;
    --text-dim: #9ca3af;
  }

  html, body { 
    margin:0; padding:0; box-sizing:border-box; 
    overscroll-behavior-y: contain; 
  }

  body {
    background:var(--bg); color:var(--text);
    font-family:'Noto Sans TC',sans-serif;
    min-height:100vh; padding:20px 16px 60px;
  }

  /* 離線變色 */
  body.is-offline .header h1 { color: var(--offline-orange) !important; }
  body.is-offline .header h1::after { content: " (離線)"; font-size: 12px; margin-left: 6px; }

  .header { text-align:center; margin-bottom:16px; }
  .jcb-badge {
    background:var(--jcb-red); color:#fff;
    font-family:'DM Mono',monospace; font-size:12px; font-weight:500;
    padding:3px 8px; border-radius:4px;
  }
  .header h1 { font-size:20px; font-weight:700; margin: 8px 0 4px; }
  .header-sub { font-size:12px; color:var(--text-muted); font-family: 'DM Mono'; }

  /* 知識看板 - 高度壓縮版 */
  .knowledge-card {
    background: var(--blue-dim); border: 1px solid var(--blue);
    border-radius: 10px; padding: 10px 14px; margin-bottom: 16px;
    display: flex; gap: 10px; align-items: center;
  }
  .k-icon { font-size: 16px; }
  .k-content { flex: 1; }
  .k-title { font-size: 11px; font-weight: 700; color: var(--blue); }
  .k-text { font-size: 11px; color: var(--text-dim); line-height: 1.4; }

  /* 時段狀態 */
  .period-bar {
    background:var(--surface); border:1px solid var(--border);
    border-radius:10px; padding:10px 16px; margin-bottom:20px;
    display:flex; align-items:center; gap:10px;
  }
  .period-dot { width:8px; height:8px; border-radius:50%; background: #333; }
  .period-dot.open { background:var(--jcb-green); box-shadow:0 0 6px var(--jcb-green); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
  .period-status { font-size:12px; font-weight:500; }
  .period-status.open { color:var(--jcb-green); }

  /* 卡片版面 - 嚴格限制高度與間距 */
  .cards-grid { display:grid; grid-template-columns:1fr; gap:10px; }
  .card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; padding:12px 14px;
    position:relative; overflow:hidden;
    display: flex; flex-direction: column; gap: 8px;
  }
  .card::before {
    content:''; position:absolute; top:0; left:0;
    width:3px; height:100%; background:var(--border);
  }
  .card.maxed::before        { background:var(--jcb-red); }
  .card.monthly-done::before { background:var(--yellow); }
  .card.open-window::before  { background:var(--jcb-green); }

  .card-top { display:flex; align-items:center; gap:10px; }
  .card-icon {
    width:32px; height:32px; border-radius:6px;
    display:flex; align-items:center; justify-content:center;
    font-size:16px; background:var(--surface2);
  }
  .card-meta { flex:1; }
  .card-name { font-size:13px; font-weight:500; }
  .card-bank { font-size:10px; color:var(--text-muted); }

  .card-bottom { display:flex; align-items:center; justify-content:space-between; }
  .pips { display:flex; gap:4px; }
  .pip {
    width:18px; height:18px; border-radius:50%; border:1.5px solid var(--border);
    display:flex; align-items:center; justify-content:center; font-size:9px;
  }
  .pip.used { background:var(--jcb-red); border-color:var(--jcb-red); color:#fff; }

  .btn-register {
    padding:6px 12px; border-radius:6px; border:none;
    font-size:12px; font-weight:500; cursor:pointer;
    min-width: 80px; text-align: center;
  }
  .btn-register.can      { background:var(--jcb-green); color:#0d0f14; }
  .btn-register.disabled { background:var(--surface2); color:var(--text-muted); cursor:not-allowed; }

  /* Toast */
  #toast {
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(80px);
    background:var(--surface2); border:1px solid var(--border); color:var(--text);
    padding:8px 16px; border-radius:20px; font-size:12px; z-index:999;
    transition:transform .3s, opacity .3s; opacity:0;
  }
  #toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">
    <span class="jcb-badge">JCB</span>
    <h1>登錄管家</h1>
  </div>
  <div class="header-sub" id="current-date"></div>
</div>

<div class="knowledge-card" id="knowledge-card">
  <div class="k-icon">💡</div>
  <div class="k-content">
    <div class="k-title" id="k-title">卡片知識</div>
    <div class="k-text" id="k-text">載入中...</div>
  </div>
</div>

<div class="period-bar">
  <div class="period-dot" id="period-dot"></div>
  <div class="period-status" id="period-status">偵測中...</div>
</div>

<div class="section-title">我的 JCB 卡片</div>
<div class="cards-grid" id="cards-grid"></div>

<div id="toast"></div>

<script>
const CARDS = [
  { id:'federal_breezy', bank:'聯邦銀行', name:'微風 JCB', icon:'🌿' },
  { id:'federal_crane',  bank:'聯邦銀行', name:'吉鶴 JCB', icon:'🦢' },
  { id:'ctbc_lala',      bank:'中國信託', name:'LALAPORT JCB', icon:'🛍️' },
  { id:'esun_kumamon',   bank:'玉山銀行', name:'熊本熊 JCB', icon:'🐻' },
  { id:'skb_easycard',   bank:'新光銀行', name:'新光悠遊 JCB', icon:'🚇' },
  { id:'fubon_jcb',      bank:'富邦銀行', name:'JU卡紅 JCB', icon:'💳' }
];

const KNOWLEDGE_BASE = [
  { title: "2026 JCB 新制", text: "悠遊卡自動加值 10% 改為「每卡每年限登錄 3 次」，請精打細算。" },
  { title: "機場接送", text: "晶緻卡單筆滿 3 萬享免費接送，每月限量 1,000 趟，需提早預約。" },
  { title: "星巴克優惠", text: "每週一 10:30 開放領序號，現場買指定飲品享半價。" },
  { title: "日本店面回饋", text: "2026 JCB 日本實體消費滿額享回饋，出國前記得官網登錄。" },
  { title: "自動加值", text: "餘額低於 100 元自動加 500。這筆也算在信用卡消費回饋內！" }
];

const KEY = 'jcb_v4';
let data = JSON.parse(localStorage.getItem(KEY)) || {};

function showRandomKnowledge() {
  const item = KNOWLEDGE_BASE[Math.floor(Math.random() * KNOWLEDGE_BASE.length)];
  document.getElementById('k-title').textContent = item.title;
  document.getElementById('k-text').textContent = item.text;
}

function getWeekday(date) {
  return ["週日", "週一", "週二", "週三", "週四", "週五", "週六"][date.getDay()];
}

function render() {
  const t = new Date();
  const dateStr = `${t.getFullYear()}/${t.getMonth()+1}/${t.getDate()} (${getWeekday(t)}) ${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
  document.getElementById('current-date').textContent = dateStr;

  const day = t.getDate();
  const isOpen = (day >= 1 && day <= 5) || (day >= 11 && day <= 15) || (day >= 21 && day <= 25);
  
  document.getElementById('period-status').textContent = isOpen ? "✓ 目前為登錄時段" : "✕ 目前非登錄時段";
  document.getElementById('period-status').className = 'period-status ' + (isOpen ? 'open' : '');
  document.getElementById('period-dot').className = 'period-dot ' + (isOpen ? 'open' : '');

  document.getElementById('cards-grid').innerHTML = CARDS.map(c => {
    const list = data[c.id] || [];
    const isMaxed = list.length >= 3;
    let cls = isMaxed ? 'maxed' : (isOpen ? 'open-window' : '');
    
    return `
      <div class="card ${cls}">
        <div class="card-top">
          <div class="card-icon">${c.icon}</div>
          <div class="card-meta"><div class="card-name">${c.name}</div><div class="card-bank">${c.bank}</div></div>
        </div>
        <div class="card-bottom">
          <div class="pips">${[0,1,2].map(i => `<div class="pip ${i<list.length?'used':''}"></div>`).join('')}</div>
          <button class="btn-register ${isOpen && !isMaxed ?'can':'disabled'}">
            ${isMaxed ? '已滿' : (isOpen ? '確認登錄' : '待機')}
          </button>
        </div>
      </div>`;
  }).join('');
}

// 監聽網路
window.addEventListener('online', () => document.body.classList.remove('is-offline'));
window.addEventListener('offline', () => {
  document.body.classList.add('is-offline');
  const el=document.getElementById('toast');
  el.textContent='⚠️ 離線模式'; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2000);
});

render();
showRandomKnowledge();
setInterval(render, 60000);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
